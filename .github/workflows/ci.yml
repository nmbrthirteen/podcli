name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript build + typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
      - run: npm run build

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
      - name: Install minimal test deps
        # Skip whisper/torch — tests don't exercise them and they balloon CI time.
        run: |
          python -m pip install --upgrade pip
          pip install pytest numpy Pillow python-dotenv questionary opencv-python-headless
      - name: Run pytest
        run: pytest tests/ -v
