# Cuts a release on a v* tag: cross-compiles the Go launcher for all 5 targets,
# builds whisper.cpp per platform, publishes both as release assets (the names
# the npm wrapper, self-update, and provisioner expect), then publishes npm.
#
# The whisper.cpp matrix below is unverified until the first tagged run — the
# binary name / cmake flags may need adjustment for the pinned whisper.cpp ref.
name: release

on:
  push:
    tags:
      - 'v*'

# Default to read-only; only the release job that publishes assets gets write.
permissions:
  contents: read

jobs:
  build:
    # darwin builds on macOS so the arm64 binary is signed in a way Apple
    # Silicon's kernel accepts; cross-compiling it on Linux yields a binary the
    # kernel SIGKILLs at exec.
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - { runner: macos-14, goos: darwin, goarch: arm64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-latest, goos: linux, goarch: arm64 }
          - { runner: ubuntu-latest, goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Build launcher
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          go generate ./...   # sync backend + PodStack commands for go:embed, write VERSION
          # The launcher embeds VERSION (generated from package.json). Refuse to ship a
          # tag that disagrees with it rather than publish a mislabelled binary.
          EMBEDDED="$(cat VERSION)"
          if [ "$VERSION" != "$EMBEDDED" ]; then
            echo "tag v${VERSION} does not match package.json version ${EMBEDDED}" >&2
            exit 1
          fi
          EXT=""
          [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          OUT="podcli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          go build -trimpath -ldflags "-s -w" -o "../${OUT}" .
          echo "ASSET=${OUT}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  whisper:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, goos: darwin, goarch: arm64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { runner: windows-latest, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.runner }}
    env:
      WHISPER_REF: v1.7.4 # pin a known-good whisper.cpp tag
    steps:
      - name: Clone whisper.cpp
        uses: actions/checkout@v7
        with:
          repository: ggml-org/whisper.cpp
          ref: ${{ env.WHISPER_REF }}
      - name: Build (static; Metal embedded on macOS)
        shell: bash
        run: |
          EXTRA=""
          if [ "${{ matrix.goos }}" = "darwin" ]; then EXTRA="-DGGML_METAL_EMBED_LIBRARY=ON"; fi
          cmake -B build -DBUILD_SHARED_LIBS=OFF -DCMAKE_BUILD_TYPE=Release $EXTRA
          cmake --build build --config Release --target whisper-cli -j
      - name: Stage asset
        shell: bash
        run: |
          EXT=""; [ "${{ matrix.goos }}" = "windows" ] && EXT=".exe"
          SRC=$(find build -name "whisper-cli${EXT}" -type f | head -1)
          OUT="whisper-cli-${{ matrix.goos }}-${{ matrix.goarch }}${EXT}"
          cp "$SRC" "$OUT"
          echo "ASSET=$OUT" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  # Apple Silicon only. Linux and Windows already get correct native builds from
  # the static sources the provisioner uses; macOS has no upstream arm64 static,
  # and the URL we pointed at serves x86_64 to every Mac, so ffmpeg ran under
  # Rosetta at roughly a third of native encode speed.
  ffmpeg-darwin:
    runs-on: macos-14
    env:
      FFMPEG_TAG: n7.1
    steps:
      - name: Build ffmpeg (arm64, static libx264)
        shell: bash
        run: |
          brew install --quiet nasm pkg-config
          deps="$GITHUB_WORKSPACE/deps"
          # Build x264 static-only: Homebrew's prefix carries libx264.dylib next to
          # the .a and ld prefers the dylib, which would bake a Homebrew path into a
          # binary we ship to machines that have no Homebrew.
          git clone -q --depth 1 -b stable https://code.videolan.org/videolan/x264.git
          (cd x264 && ./configure --prefix="$deps" --enable-static --enable-pic --disable-cli && make -j"$(sysctl -n hw.ncpu)" && make install)
          curl -fsSL "https://ffmpeg.org/releases/ffmpeg-${FFMPEG_TAG#n}.tar.xz" -o ffmpeg.tar.xz
          tar xf ffmpeg.tar.xz && cd "ffmpeg-${FFMPEG_TAG#n}"
          PKG_CONFIG_PATH="$deps/lib/pkgconfig" ./configure \
            --enable-gpl --enable-libx264 \
            --pkg-config-flags=--static \
            --extra-cflags="-I$deps/include" --extra-ldflags="-L$deps/lib" \
            --disable-shared --enable-static \
            --disable-doc --disable-debug --disable-ffplay
          make -j"$(sysctl -n hw.ncpu)" ffmpeg ffprobe
          cd ..
          cp "ffmpeg-${FFMPEG_TAG#n}/ffmpeg" ffmpeg-darwin-arm64
          cp "ffmpeg-${FFMPEG_TAG#n}/ffprobe" ffprobe-darwin-arm64
      - name: Verify the binaries are native and self-contained
        shell: bash
        run: |
          for b in ffmpeg-darwin-arm64 ffprobe-darwin-arm64; do
            file "$b" | grep -q arm64 || { echo "$b is not arm64"; exit 1; }
            if otool -L "$b" | tail -n +2 | grep -qv -e '/usr/lib/' -e '/System/'; then
              echo "$b links a non-system library:"; otool -L "$b"; exit 1
            fi
          done
          ./ffmpeg-darwin-arm64 -hide_banner -encoders | grep -q libx264
      - uses: actions/upload-artifact@v7
        with:
          name: ffmpeg-darwin-arm64
          path: |
            ffmpeg-darwin-arm64
            ffprobe-darwin-arm64

  studio:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build studio bundle
        run: |
          npm version --no-git-tag-version --allow-same-version "${GITHUB_REF_NAME#v}"
          npm ci
          sh scripts/build-studio.sh dist/studio
          tar -czf studio-bundle.tar.gz -C dist/studio .
      - uses: actions/upload-artifact@v7
        with:
          name: studio-bundle.tar.gz
          path: studio-bundle.tar.gz

  remotion:
    # Per-platform: @rspack and the Remotion compositor ship native binaries, so
    # the bundle is not portable across os/arch.
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: macos-14, goos: darwin, goarch: arm64 }
          - { runner: ubuntu-latest, goos: linux, goarch: amd64 }
          - { runner: ubuntu-24.04-arm, goos: linux, goarch: arm64 }
          - { runner: windows-latest, goos: windows, goarch: amd64 }
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build remotion bundle
        shell: bash
        run: |
          sh scripts/build-remotion.sh dist/remotion-bundle
          OUT="remotion-bundle-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          tar -czf "$OUT" -C dist/remotion-bundle .
          echo "ASSET=$OUT" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ env.ASSET }}
          path: ${{ env.ASSET }}

  release:
    needs: [build, whisper, studio, remotion, ffmpeg-darwin]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LANDING_DISPATCH_TOKEN: ${{ secrets.LANDING_DISPATCH_TOKEN }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        working-directory: dist
        run: |
          sha256sum * > "$RUNNER_TEMP/checksums.txt"
          mv "$RUNNER_TEMP/checksums.txt" checksums.txt
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
      - name: Rebuild the landing site so the changelog picks up this release
        if: ${{ env.LANDING_DISPATCH_TOKEN != '' }}
        run: |
          curl -sf -X POST \
            -H "Authorization: Bearer $LANDING_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/nmbrthirteen/podcli-landing/dispatches \
            -d "{\"event_type\":\"release\",\"client_payload\":{\"tag\":\"${GITHUB_REF_NAME}\"}}"
