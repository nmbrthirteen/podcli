# PR CI never produces a real clip, so a change can break the render pipeline
# and still go green. This runs the real path once a release is published
# (plus manual dispatch). Scheduled daily was dropping unrelated failures when
# nothing in the repo changed.
name: post-release-render

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  render:
    name: End-to-end render
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: '20'
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'

      - name: Install ffmpeg
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)   sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg ;;
            macOS)   brew install --quiet ffmpeg ;;
            Windows) choco install ffmpeg -y --no-progress ;;
          esac
          ffmpeg -version | head -1

      - name: Install dependencies
        shell: bash
        run: |
          npm ci
          python -m pip install --upgrade pip
          pip install numpy Pillow python-dotenv opencv-python-headless

      - name: Render a clip per caption style
        shell: bash
        run: |
          for style in branded hormozi karaoke subtle; do
            echo "::group::$style"
            python scripts/e2e_render.py "$style"
            echo "::endgroup::"
          done

      - name: Render the caption compositions directly
        shell: bash
        run: node remotion/test-render.mjs branded

      - name: Upload the failed render for inspection
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: e2e-render-${{ matrix.os }}
          path: e2e-artifacts/
          retention-days: 7
          if-no-files-found: ignore
